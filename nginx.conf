server {
    listen 80;
    server_name localhost;

    location /static/ {
        alias /djangoapp/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /djangoapp/media/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        return 404;
    }
}
